name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 21 installe en premier pour capturer son chemin avant que Java 11 devienne le defaut
      - name: Set up JDK 21 (fork de compilation)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Capturer le chemin Java 21
        run: echo "JAVA21_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # Java 11 devient le JDK principal (requis pour Gradle 6.8.1)
      - name: Set up JDK 11 (daemon Gradle)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Cache separé pour les modules Gradle (change quand les deps changent)
      - name: Cache Gradle modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Cache separé pour ForgeGradle : mappings Minecraft, tres stable (lie a MC + Forge version)
      - name: Cache ForgeGradle (mappings Minecraft)
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: ${{ runner.os }}-forge-mc1.16.5-forge36.2.34

      # Workaround bug ForgeGradle 4.1.x : MappingFile.write() ne cree pas le dossier parent
      - name: Pre-creer les dossiers ForgeGradle
        run: mkdir -p ~/.gradle/caches/forge_gradle/mcp_repo/de/oceanlabs/mcp/mcp_config/1.16.5/

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon jar -Pjava21Home="$JAVA21_HOME"

      - name: Trouver le JAR produit
        id: find_jar
        run: |
          JAR=$(ls build/libs/*-[0-9]*.jar | grep -v sources | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "DistrictLife Phone ${{ github.ref_name }}"
          body: |
            ## DistrictLife Phone ${{ github.ref_name }}

            **Forge** : 1.16.5-36.2.34
            **Dependance requise** : [Simple Voice Chat](https://modrinth.com/plugin/simple-voice-chat) `1.16.5-2.5.36+`

            ### Installation
            Placer le fichier `.jar` dans le dossier `mods/` de ton serveur/client Forge 1.16.5.
          files: ${{ steps.find_jar.outputs.jar_path }}
          fail_on_unmatched_files: true
